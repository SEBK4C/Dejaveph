<svg xmlns="http://www.w3.org/2000/svg" width="900" height="588" viewBox="0 0 900 588" font-family="sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="8" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#5f6368"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea4335"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="588" fill="#ffffff"/>
  <text x="300" y="30" text-anchor="middle" font-size="21" font-weight="700" fill="#202124">Dejaveph — self-hosted Xet CAS + reconstructing VFS</text>
  <text x="300" y="50" text-anchor="middle" font-size="12.5" fill="#5f6368">content-defined chunking · BLAKE3 · dedup · FUSE mount · local-fs / S3·RGW</text>

  <!-- ===== CLIENT HOST ===== -->
  <rect x="40" y="70" width="520" height="150" rx="12" fill="#eef3fe" stroke="#4285f4" stroke-width="1.5"/>
  <text x="54" y="90" font-size="12.5" font-weight="700" fill="#4285f4">CLIENT HOST</text>

  <rect x="56" y="102" width="232" height="48" rx="8" fill="#ffffff" stroke="#4285f4" stroke-width="1.2"/>
  <text x="172" y="122" text-anchor="middle" font-size="13.5" font-weight="600" fill="#202124">xetfs — FUSE mount</text>
  <text x="172" y="139" text-anchor="middle" font-size="11" fill="#5f6368">read + write-back (M2/M3)</text>

  <rect x="372" y="102" width="172" height="48" rx="8" fill="#ffffff" stroke="#4285f4" stroke-width="1.2"/>
  <text x="458" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">chunk cache</text>
  <text x="458" y="139" text-anchor="middle" font-size="11" fill="#5f6368">content-addressed</text>

  <rect x="56" y="164" width="300" height="48" rx="8" fill="#ffffff" stroke="#4285f4" stroke-width="1.2"/>
  <text x="206" y="184" text-anchor="middle" font-size="13.5" font-weight="600" fill="#202124">xet-agent — ingest / reconstruct</text>
  <text x="206" y="201" text-anchor="middle" font-size="11" fill="#5f6368">Gearhash · BLAKE3 · 3-tier dedup · (de)serialize</text>

  <line x1="172" y1="150" x2="172" y2="164" stroke="#5f6368" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="356" y1="188" x2="372" y2="160" stroke="#5f6368" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== XETD SERVER ===== -->
  <rect x="40" y="262" width="520" height="180" rx="12" fill="#e6f4ea" stroke="#34a853" stroke-width="1.5"/>
  <text x="54" y="282" font-size="12.5" font-weight="700" fill="#188038">xetd SERVER  (stateless handlers over two stores)</text>

  <rect x="56" y="294" width="488" height="62" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.2"/>
  <text x="300" y="314" text-anchor="middle" font-size="13.5" font-weight="600" fill="#202124">HTTP API  +  bearer-token auth (read / write scopes)</text>
  <text x="300" y="332" text-anchor="middle" font-size="11.5" fill="#5f6368">/reconstructions · /chunks · /xorbs · /shards</text>
  <text x="300" y="348" text-anchor="middle" font-size="11.5" fill="#5f6368">/files · /volumes · /xorb-data · /admin</text>

  <rect x="56" y="372" width="234" height="56" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.2"/>
  <text x="173" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">Index (SQLite / in-mem)</text>
  <text x="173" y="408" text-anchor="middle" font-size="11" fill="#5f6368">xorb catalog · global chunk index</text>
  <text x="173" y="422" text-anchor="middle" font-size="11" fill="#5f6368">files · VFS catalog</text>

  <rect x="310" y="372" width="234" height="56" rx="8" fill="#ffffff" stroke="#34a853" stroke-width="1.2"/>
  <text x="427" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">BlobStore trait</text>
  <text x="427" y="408" text-anchor="middle" font-size="11" fill="#5f6368">immutable, content-addressed</text>
  <text x="427" y="422" text-anchor="middle" font-size="11" fill="#5f6368">xorb bytes (mutable index ✕)</text>

  <line x1="173" y1="356" x2="173" y2="372" stroke="#5f6368" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="427" y1="356" x2="427" y2="372" stroke="#5f6368" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== OBJECT BACKEND ===== -->
  <rect x="40" y="484" width="520" height="86" rx="12" fill="#fef7e0" stroke="#f9ab00" stroke-width="1.5"/>
  <text x="54" y="504" font-size="12.5" font-weight="700" fill="#b06000">OBJECT BACKEND  (pluggable)</text>

  <rect x="56" y="514" width="234" height="44" rx="8" fill="#ffffff" stroke="#f9ab00" stroke-width="1.2"/>
  <text x="173" y="541" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">local-fs  (fanned-out keys)</text>

  <rect x="310" y="514" width="234" height="44" rx="8" fill="#ffffff" stroke="#f9ab00" stroke-width="1.2"/>
  <text x="427" y="535" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">Ceph RGW / S3</text>
  <text x="427" y="550" text-anchor="middle" font-size="10.5" fill="#5f6368">presigned GET · --features s3</text>

  <line x1="330" y1="428" x2="200" y2="514" stroke="#5f6368" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="450" y1="428" x2="450" y2="514" stroke="#5f6368" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== client <-> server ===== -->
  <line x1="206" y1="212" x2="206" y2="294" stroke="#5f6368" stroke-width="1.6" marker-start="url(#arrowB)" marker-end="url(#arrow)"/>
  <text x="214" y="245" font-size="11.5" font-weight="600" fill="#3c4043">HTTP + bearer</text>
  <text x="214" y="259" font-size="10.5" fill="#5f6368">API calls</text>

  <!-- ===== presigned direct fetch (off xetd) ===== -->
  <path d="M 544 188 L 575 188 L 575 536 L 544 536" fill="none" stroke="#ea4335" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrowR)"/>
  <text x="582" y="356" font-size="11.5" font-weight="600" fill="#ea4335">presigned ranged GET</text>
  <text x="582" y="370" font-size="10.5" fill="#ea4335">bulk xorb bytes — off xetd</text>

  <!-- ===== HOW IT WORKS panel ===== -->
  <rect x="610" y="70" width="278" height="500" rx="12" fill="#f8f9fa" stroke="#dadce0" stroke-width="1.3"/>
  <text x="626" y="92" font-size="13" font-weight="700" fill="#202124">HOW IT WORKS</text>

  <text x="626" y="118" font-size="12" font-weight="700" fill="#4285f4">① INGEST</text>
  <text x="626" y="136" font-size="11.5" fill="#3c4043">1. chunk file (Gearhash CDC)</text>
  <text x="626" y="153" font-size="11.5" fill="#3c4043">2. hash chunks (BLAKE3 keyed)</text>
  <text x="626" y="170" font-size="11.5" fill="#3c4043">3. dedup — GET /chunks per chunk</text>
  <text x="626" y="187" font-size="11.5" fill="#3c4043">4. pack NEW chunks into xorbs</text>
  <text x="626" y="204" font-size="11.5" fill="#3c4043">5. POST /xorbs — integrity gate</text>
  <text x="640" y="219" font-size="11" fill="#5f6368">recompute Merkle root == hash</text>
  <text x="626" y="236" font-size="11.5" fill="#3c4043">6. POST /files — file_hash → terms</text>

  <text x="626" y="264" font-size="12" font-weight="700" fill="#188038">② RECONSTRUCT</text>
  <text x="626" y="282" font-size="11.5" fill="#3c4043">1. GET /reconstructions/{hash}</text>
  <text x="626" y="299" font-size="11.5" fill="#3c4043">2. → terms + presigned fetch_info</text>
  <text x="626" y="316" font-size="11.5" fill="#3c4043">3. fetch xorb byte ranges</text>
  <text x="626" y="333" font-size="11.5" fill="#3c4043">4. deserialize + decompress chunks</text>
  <text x="626" y="350" font-size="11.5" fill="#3c4043">5. concat → original bytes</text>

  <text x="626" y="378" font-size="12" font-weight="700" fill="#b06000">③ MOUNT (xetfs)</text>
  <text x="626" y="396" font-size="11.5" fill="#3c4043">lookup / readdir — from catalog</text>
  <text x="626" y="413" font-size="11.5" fill="#3c4043">read — reconstruct (cached)</text>
  <text x="626" y="430" font-size="11.5" fill="#3c4043">write — stage, re-ingest on close</text>
  <text x="640" y="445" font-size="11" fill="#5f6368">incremental == full ingest</text>

  <line x1="626" y1="462" x2="872" y2="462" stroke="#dadce0" stroke-width="1"/>
  <text x="626" y="482" font-size="12" font-weight="700" fill="#ea4335">EDIT LOCALITY</text>
  <text x="626" y="500" font-size="11.5" fill="#3c4043">a 1-byte edit re-uploads only the</text>
  <text x="626" y="517" font-size="11.5" fill="#3c4043">changed chunks — everything else</text>
  <text x="626" y="534" font-size="11.5" fill="#3c4043">references existing xorbs (dedup).</text>
  <text x="626" y="556" font-size="11" fill="#5f6368">wire-compatible with hf-xet hashing.</text>
</svg>
